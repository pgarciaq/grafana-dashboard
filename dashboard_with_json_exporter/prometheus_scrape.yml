# Prometheus scrape configuration for Cost Management json_exporter
#
# Add these jobs to your existing prometheus.yml under scrape_configs:.
# Adjust localhost references if json_exporter runs on a different host.
#
# IMPORTANT: The target URL MUST be set via params.target (not via
# static_configs.targets + relabel). If you use static_configs with
# relabel, the & characters in the API query string get parsed as
# separate Prometheus scrape parameters, truncating the target URL and
# dropping group_by[project]=* silently.
#
# Brackets in API parameters (filter[...], group_by[...]) are
# pre-encoded as %5B/%5D in the target URL below.

scrape_configs:
  # Scrape json_exporter's own /metrics endpoint (health, request stats)
  - job_name: json_exporter
    static_configs:
      - targets:
          - localhost:7979

  # Scrape OpenShift cost data via json_exporter's /probe endpoint.
  # Prometheus passes the Cost Management API URL as the "target" param;
  # json_exporter fetches it (with OAuth2) and returns Prometheus metrics.
  #
  # The query uses filter[time_scope_value]=-30 (last 30 days), matching
  # the native and proxy dashboard variants so all three show the same data.
  #
  # NOTE: A single -90 day query would cover all retained data, but the
  # Cost Management API returns duplicate date+project entries at
  # billing-month boundaries, which json_exporter rejects.  -30 days
  # stays within a single billing period and avoids this issue.
  - job_name: ocp_costs
    scrape_interval: 15m
    scrape_timeout: 60s
    metrics_path: /probe
    params:
      module: [ocp_costs]
      target:
        - "https://console.redhat.com/api/cost-management/v1/reports/openshift/costs/?filter%5Bresolution%5D=daily&filter%5Btime_scope_value%5D=-30&filter%5Btime_scope_units%5D=day&group_by%5Bproject%5D=*"
    static_configs:
      - targets: ['localhost:7979']
    relabel_configs:
      - source_labels: [__param_target]
        target_label: instance
